name: KaltraSounds source CI

on:
  pull_request:
    paths:
      - 'KaltraSoundsBeta8/**'
      - '.github/workflows/kaltrasounds-ci.yml'
  push:
    branches: [main]
    paths:
      - 'KaltraSoundsBeta8/**'
      - '.github/workflows/kaltrasounds-ci.yml'
  workflow_dispatch:

concurrency:
  group: kaltrasounds-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and inspect
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: KaltraSoundsBeta8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build with committed Gradle Wrapper
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Inspect and package JAR
        shell: bash
        run: |
          set -euo pipefail
          JAR="$(find build/libs -maxdepth 1 -type f -name 'KaltraSounds-*.jar' | head -n1)"
          test -f "$JAR"

          unzip -p "$JAR" plugin.yml | tee "$RUNNER_TEMP/plugin.yml"
          grep -Eq '^version: 1\.0\.0-beta\.[0-9]+$' "$RUNNER_TEMP/plugin.yml"
          grep -F "api-version: '26.1'" "$RUNNER_TEMP/plugin.yml"

          if unzip -Z1 "$JAR" | grep -Eq '^(org/bukkit|io/papermc)/'; then
            echo 'The plugin JAR bundles Bukkit or Paper classes.' >&2
            exit 1
          fi

          unzip -t "$JAR"
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp "$JAR" "$GITHUB_WORKSPACE/dist/"
          BASENAME="$(basename "$JAR")"
          (
            cd "$GITHUB_WORKSPACE/dist"
            sha256sum "$BASENAME" > "$BASENAME.sha256"
          )

      - name: Upload compressed build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KaltraSounds-build-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  paper-smoke:
    name: Paper smoke test
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: actions/download-artifact@v4
        with:
          name: KaltraSounds-build-${{ github.sha }}
          path: dist

      - name: Boot Paper 26.1.1 and validate
        shell: bash
        run: |
          set -euo pipefail
          UA='KaltraSounds-CI/1.0 (https://github.com/cloudynsk/KaltraSounds)'
          BUILDS="$(curl -fsS -H "User-Agent: $UA" https://fill.papermc.io/v3/projects/paper/versions/26.1.1/builds)"
          PAPER_URL="$(printf '%s' "$BUILDS" | jq -r 'first(.[] | select(.channel == "STABLE") | .downloads["server:default"].url) // .[0].downloads["server:default"].url // empty')"
          test -n "$PAPER_URL"

          JAR="$(find dist -maxdepth 1 -type f -name 'KaltraSounds-*.jar' | head -n1)"
          test -f "$JAR"

          mkdir -p smoke/plugins
          curl -fL -H "User-Agent: $UA" -o smoke/paper.jar "$PAPER_URL"
          cp "$JAR" smoke/plugins/
          printf 'eula=true\n' > smoke/eula.txt
          cat > smoke/server.properties <<'PROPERTIES'
          online-mode=false
          server-port=25565
          max-players=1
          view-distance=2
          simulation-distance=2
          spawn-protection=0
          enable-query=false
          enable-rcon=false
          PROPERTIES

          cd smoke
          mkfifo console
          exec 3<>console
          java -Xms1G -Xmx2G -jar paper.jar --nogui <console >server.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            if kill -0 "$SERVER_PID" 2>/dev/null; then
              printf 'stop\n' >&3 || true
              sleep 5
              kill "$SERVER_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          READY=false
          for _ in $(seq 1 300); do
            if grep -q 'Done (' server.log; then
              READY=true
              break
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              cat server.log
              echo 'Paper exited before startup completed.' >&2
              exit 1
            fi
            sleep 1
          done
          test "$READY" = true

          printf 'pms info\n' >&3
          printf 'pms validate\n' >&3
          printf 'pms reload all\n' >&3
          sleep 1
          printf 'pms validate\n' >&3
          sleep 5
          printf 'stop\n' >&3
          wait "$SERVER_PID"
          trap - EXIT

          cat server.log
          grep -F 'KaltraSounds enabled:' server.log
          test "$(grep -Fc 'Configuration validation passed.' server.log)" -ge 2
          grep -F 'KaltraSounds disabled; scheduled sounds, region loops and integrations were stopped.' server.log
          test -f plugins/KaltraSounds/CONFIG-GUIDE.txt
          test -f plugins/KaltraSounds/nbs/README.txt

          if grep -E 'KaltraSounds failed to enable|Could not load.*KaltraSounds|NoClassDefFoundError|NoSuchMethodError|UnsupportedClassVersionError|Reload failed|Configuration problem' server.log; then
            echo 'A release-blocking KaltraSounds error was found.' >&2
            exit 1
          fi

          gzip -9 server.log
          mv server.log.gz ../KaltraSounds-Paper-smoke.log.gz

      - name: Upload compressed smoke log
        uses: actions/upload-artifact@v4
        with:
          name: KaltraSounds-smoke-${{ github.sha }}
          path: KaltraSounds-Paper-smoke.log.gz
          if-no-files-found: error
          retention-days: 14
