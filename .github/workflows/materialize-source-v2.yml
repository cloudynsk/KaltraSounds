name: Materialize source branch v2

on:
  push:
    branches:
      - agent/build-beta6-java25
    paths:
      - .github/workflows/materialize-source-v2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'

      - name: Reconstruct and push verified beta.7 source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "f7e287d20906dfaf5daab5a2d25df99c811dfedf5a0e44ed2ef95c36aba51949  KaltraSounds-1.0.0-beta.6-fixed-source.zip" | sha256sum --check --strict
          cat patches/beta7/chunks/* > "$RUNNER_TEMP/beta7.patch"
          echo "33c6811382f72dd2f72dd03957a4c1e0ece94cb4f517e59adda72ea933151f01  $RUNNER_TEMP/beta7.patch" | sha256sum --check --strict

          rm -rf "$RUNNER_TEMP/source"
          mkdir -p "$RUNNER_TEMP/source"
          unzip -q KaltraSounds-1.0.0-beta.6-fixed-source.zip -d "$RUNNER_TEMP/source"
          SOURCE_DIR="$(find "$RUNNER_TEMP/source" -name build.gradle.kts -type f -printf '%h\n' | head -n 1)"
          test -n "$SOURCE_DIR"

          cd "$SOURCE_DIR"
          git init -q
          git apply --check "$RUNNER_TEMP/beta7.patch"
          git apply "$RUNNER_TEMP/beta7.patch"
          gradle wrapper --gradle-version 9.1.0 --distribution-type bin

          cat > DEVELOPMENT-WORKFLOW.md <<'DOC'
          # Development workflow

          The complete plugin source is canonical on `develop`.

          - Edit source files directly, not ZIP or patch fragments.
          - Keep Gradle and plugin.yml versions synchronized.
          - Run the committed Gradle Wrapper with Java 25.
          - GitHub Actions compiles, inspects the JAR, boots Paper 26.1.1, runs validation and reload checks, then uploads artifacts.
          - Patch fragments are historical migration data only.
          DOC

          rm -rf .git
          git init -q
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Materialize verified beta.7 source tree with Gradle wrapper'
          git branch -M develop
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin develop
