name: Build KaltraSounds beta.7

on:
  pull_request:
  push:
    branches: [agent/build-beta6-java25]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify and apply beta.7 patch
        shell: bash
        run: |
          set -euo pipefail
          echo "f7e287d20906dfaf5daab5a2d25df99c811dfedf5a0e44ed2ef95c36aba51949  KaltraSounds-1.0.0-beta.6-fixed-source.zip" | sha256sum -c --strict
          cat patches/beta7/chunks/* > "$RUNNER_TEMP/beta7.patch"
          echo "33c6811382f72dd2f72dd03957a4c1e0ece94cb4f517e59adda72ea933151f01  $RUNNER_TEMP/beta7.patch" | sha256sum -c --strict
          rm -rf extracted && mkdir extracted
          unzip -q KaltraSounds-1.0.0-beta.6-fixed-source.zip -d extracted
          SOURCE_DIR="$(find extracted -name build.gradle.kts -type f -printf '%h\n' | head -n1)"
          test -n "$SOURCE_DIR"
          (
            cd "$SOURCE_DIR"
            git init -q
            git apply --check --verbose "$RUNNER_TEMP/beta7.patch"
            git apply "$RUNNER_TEMP/beta7.patch"
            rm -rf .git
            grep -F 'version = "1.0.0-beta.7"' build.gradle.kts
            grep -F 'version: 1.0.0-beta.7' src/main/resources/plugin.yml
            test -f LOOPING.md
            test -f src/main/java/net/kaltra/sounds/LoopSettings.java
            test -f src/main/java/net/kaltra/sounds/RepeatingSoundLoop.java
            test -f src/main/java/net/kaltra/sounds/LoopExitController.java
          )
          echo "SOURCE_DIR=$SOURCE_DIR" >> "$GITHUB_ENV"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'

      - name: Compile and inspect
        shell: bash
        run: |
          set -euo pipefail
          gradle -p "$SOURCE_DIR" clean build --stacktrace
          JAR="$(find "$SOURCE_DIR/build/libs" -maxdepth 1 -type f -name 'KaltraSounds-*.jar' | head -n1)"
          test -f "$JAR"
          unzip -p "$JAR" plugin.yml | tee plugin.yml.built
          grep -F 'version: 1.0.0-beta.7' plugin.yml.built
          grep -F "api-version: '26.1'" plugin.yml.built
          ! unzip -Z1 "$JAR" | grep -Eq '^(org/bukkit|io/papermc)/'
          mkdir -p dist
          cp "$JAR" dist/KaltraSounds-1.0.0-beta.7.jar
          HASH="$(sha256sum dist/KaltraSounds-1.0.0-beta.7.jar | awk '{print $1}')"
          printf '%s  KaltraSounds-1.0.0-beta.7.jar\n' "$HASH" | tee dist/KaltraSounds-1.0.0-beta.7.jar.sha256
          unzip -t dist/KaltraSounds-1.0.0-beta.7.jar
          cp "$SOURCE_DIR/LOOPING.md" "$SOURCE_DIR/CHANGES-beta.7.md" dist/
          (cd "$SOURCE_DIR" && zip -qr "$GITHUB_WORKSPACE/dist/KaltraSounds-1.0.0-beta.7-source.zip" . -x 'build/*' '.gradle/*' '*.class' '*.jar')

      - name: Boot Paper and validate loops
        shell: bash
        run: |
          set -euo pipefail
          UA='KaltraSounds-CI/1.0 (https://github.com/cloudynsk/KaltraSounds)'
          JSON="$(curl -fsS -H "User-Agent: $UA" https://fill.papermc.io/v3/projects/paper/versions/26.1.1/builds)"
          URL="$(printf '%s' "$JSON" | jq -r 'first(.[] | select(.channel == "STABLE") | .downloads["server:default"].url) // .[0].downloads["server:default"].url // empty')"
          test -n "$URL"
          mkdir -p smoke/plugins/KaltraSounds/Sounds
          curl -fL -H "User-Agent: $UA" -o smoke/paper.jar "$URL"
          cp dist/KaltraSounds-1.0.0-beta.7.jar smoke/plugins/
          printf 'eula=true\n' > smoke/eula.txt
          printf 'online-mode=false\nserver-port=25565\nmax-players=1\nview-distance=2\nsimulation-distance=2\n' > smoke/server.properties
          cat > smoke/plugins/KaltraSounds/Sounds/regions.yml <<'YAML'
          Version: 'KaltraSounds-1'
          KaltraSounds:
            ci_loop:
              Loop:
                Enabled: true
                Delay: 0
                Period: 20
                Period Randomness: 5
                Maximum Plays: 3
                Fade In:
                  Enabled: true
                  Plays: 3
                  Start Volume Multiplier: 0.2
                  Curve: SMOOTHSTEP
                Stop On Exit:
                  Enabled: true
                  Delay: 0
                  Fade Out:
                    Enabled: true
                    Plays: 3
                    Period: 20
                    End Volume Multiplier: 0.0
                    Curve: LINEAR
                Sounds:
                  1:
                    Sound: ambient.cave
                    Volume: 1.0
                    Pitch: 1.0
                    Options:
                      Radius: 0
          YAML
          cd smoke
          mkfifo console
          exec 3<>console
          java -Xms1G -Xmx2G -jar paper.jar --nogui <console >server.log 2>&1 &
          PID=$!
          trap 'printf "stop\n" >&3 2>/dev/null || true; sleep 3; kill $PID 2>/dev/null || true' EXIT
          for _ in $(seq 1 300); do
            grep -q 'Done (' server.log && break
            kill -0 "$PID" 2>/dev/null || { cat server.log; exit 1; }
            sleep 1
          done
          grep -q 'Done (' server.log
          printf 'pms info\npms validate\npms reload all\npms reload sounds\npms reload regions\npms reload integrations\npms reload messages\npms reload all\npms validate\n' >&3
          sleep 6
          printf 'stop\n' >&3
          wait "$PID"
          trap - EXIT
          cat server.log
          grep -F 'KaltraSounds enabled:' server.log
          grep -F 'KaltraSounds 1.0.0-beta.7' server.log
          test "$(grep -Fc 'Configuration validation passed.' server.log)" -ge 2
          test "$(grep -Fc 'Reload complete in' server.log)" -ge 6
          grep -F 'KaltraSounds disabled; scheduled sounds, region loops and integrations were stopped.' server.log
          ! grep -E 'KaltraSounds failed to enable|Could not load.*KaltraSounds|NoClassDefFoundError|NoSuchMethodError|UnsupportedClassVersionError|Reload failed|Configuration problem' server.log
          cp server.log ../dist/Paper-26.1.1-beta.7-smoke.log

      - uses: actions/upload-artifact@v4
        with:
          name: KaltraSounds-1.0.0-beta.7
          path: dist/*
          if-no-files-found: error
          retention-days: 30
